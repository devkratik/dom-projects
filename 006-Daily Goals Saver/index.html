<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Goals</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="container__title">Daily Goals</div>
      <form class="container__form" id="task-form">
        <input
          class="container__form-task"
          type="text"
          id="task-input"
          placeholder="Task"
        />
        <textarea
          id="task-description"
          class="container__task-description"
          rows="2"
          placeholder="Task description"
        ></textarea>
        <button class="container__add-button" type="submit">Add</button>
      </form>
      <ul class="container__task-wrapper" id="tasks-container">
        <!--Tasks will go here-->
      </ul>
    </div>
  </body>
</html>
