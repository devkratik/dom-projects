<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="converter">
      <h1 class="converter__title">Currency Converter</h1>
      <form class="converter__form" id="converter-form">
        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            placeholder="Enter amount"
            required
          />
        </div>
        <div class="form-group">
          <label for="from-currency">From</label>
          <select id="from-currency">
            <!--Currency options will be inserted from our api-->
          </select>
        </div>
        <div class="form-group">
          <label for="to-currency">To</label>
          <select id="to-currency">
            <!--Currency options will be inserted from our api-->
          </select>
        </div>
        <button type="submit" class="converter__btn">Convert</button>
      </form>
      <div class="converter__result" id="result">
        <!--Result goes here.-->
      </div>
    </div>
  </body>
</html>
