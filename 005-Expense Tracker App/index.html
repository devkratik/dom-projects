<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <h1 class="container__title">Expense Tracker</h1>
      <div class="container__app">
        <div class="dashboard">
          <div class="dashboard__title">Your Balance</div>
          <div class="dashboard__balance-value">$0,000.00</div>
          <div class="dashboard__cards">
            <div class="card" id="income">
              <div class="card__title">Income</div>
              <div class="card__value">$0,000.00</div>
            </div>
            <div class="card" id="expense">
              <div class="card__title">Expense</div>
              <div class="card__value">$0,000.00</div>
            </div>
          </div>
        </div>
        <div class="record">
          <div class="record__title">Transaction</div>
          <ul class="record__transactions" id="transaction-list">
            <!-- Transactions will go here -->
          </ul>
        </div>
        <div class="controls">
          <div class="controls__title">Add Transaction</div>
          <form class="controls__form">
            <label for="description">Description</label>
            <input
              type="text"
              id="description"
              name="description"
              placeholder="Enter description..."
            />
            <label for="amount">Amount</label>
            <input
              type="text"
              id="amount"
              name="amount"
              placeholder="Enter amount..."
            />
            <p style="font-size: small; color: gray">
              Use negative (&minus;) sign for expenses.
            </p>
            <button type="submit" id="submit" class="form__submit">
              Add Transaction
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
